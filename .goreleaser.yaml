version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: sage
    main: .
    binary: sage
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/iamtraction/sage/internal/version.Version={{ .Version }}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
